<!DOCTYPE html>

<html>

<head>
<title>Vote</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<div class="title" id="electionTitle"></div>

<div id="candidates"></div>

</div>

<script>

document.getElementById("electionTitle").innerText =
localStorage.getItem("electionType") + " Election";

async function loadCandidates(){

const res = await fetch("http://localhost:3000/candidates");
const candidates = await res.json();

const container = document.getElementById("candidates");

container.innerHTML="";

candidates.forEach(c => {

const div = document.createElement("div");
div.className="candidate";

div.innerHTML = `
<h3>${c.name}</h3>
<p>${c.department}</p>
<p>${c.position}</p>

<button onclick="vote('${c.id}')">
Vote
</button>
`;

container.appendChild(div);

});

}

async function vote(candidateId){

const password = prompt("Confirm your password");

const token = localStorage.getItem("token");

const res = await fetch("http://localhost:3000/vote",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body:JSON.stringify({candidateId,password})

});

const text = await res.text();

alert(text);

}

loadCandidates();

</script>

</body>

</html>
